name: Update langs index

on:
  push:
    paths:
      - '**/config.ini'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run indexer
        run: python update_langs_json.py

      - name: Commit updated langs.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add langs.json
          git diff --cached --quiet || git commit -m "chore: update langs.json [skip ci]"
          git push
